    <!-- Pretendard Variable (한글 + 영문 통합) -->
    <link
      rel="stylesheet"
      as="style"

    />
    <!-- Plus Jakarta Sans (영문 포인트 — Hero · 타이틀) + JetBrains Mono (라벨) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- GitHub Pages SPA fallback receive — 404.html에서 redirect된 path를 정상 URL로 복원 -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <a href="#main" class="skip-link font-mono text-sm">메인 콘텐츠로 건너뛰기</a>
    <noscript>

        <p>JavaScript를 활성화한 후 다시 방문해주세요.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <div class="bg-noise" aria-hidden="true"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
